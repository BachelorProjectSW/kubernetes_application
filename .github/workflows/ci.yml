name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Ruff Linter
        run: |
          ruff check .

      - name: Install k3d and kubectl
        run: |
          bash test/k3d/setup_kubernetes.sh 

      - name: Create clusters and global scheduler
        run: |
          sudo bash test/k3d/create_clusters.sh

      - name: Deploy manifests
        run: |
          bash test/k3d/deploy.sh

      - name: Run tests with llama port-forward
        run: |
          # TODO Port forwarding is temp and should be replaced with tail-scale
          kubectl --cubeconfig=src/cluster_api/auth/k3d-devcluster-dk.yaml port-forward svc/llama-service 8888:8080 &
          kubectl --cubeconfig=src/cluster_api/auth/k3d-devcluster-dk.yaml port-forward svc/llama-service 8889:8080 &

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8888/v1/models && curl -fsS http://127.0.0.1:8889/v1/models; then
              pytest
              exit 0
            fi
            sleep 2
          done

          exit 1
