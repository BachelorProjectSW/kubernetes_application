name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Ruff Linter
        run: |
          ruff check .

      - name: Install k3d and kubectl
        run: |
          bash test/k3d/setup_kubernetes.sh 

      - name: Create cluster
        run: |
          sudo bash test/k3d/create_cluster.sh

      - name: Deploy manifests
        run: |
          bash test/k3d/deploy.sh
      
      - name: Wait for llama pod
        run: |
          kubectl --kubeconfig src/cluster_api/auth/k3d-devcluster.yaml get pods -A
          kubectl --kubeconfig src/cluster_api/auth/k3d-devcluster.yaml wait --for=condition=Ready pod -l name=llama-server --timeout=180s

      - name: Run tests with llama port-forward
        run: |
          set -e
          kubectl --kubeconfig src/cluster_api/auth/k3d-devcluster.yaml port-forward svc/llama-service 8080:8080 > port-forward.log 2>&1 &
          PF_PID=$!
          trap "kill $PF_PID" EXIT

          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8080/v1/models > /dev/null; then
              echo "llama-service is ready"
              pytest
              exit 0
            fi
            sleep 2
          done

          echo "llama-service never became ready"
          cat port-forward.log || true
          exit 1
        env:
          KUBECONFIG: src/cluster_api/auth/k3d-devcluster.yaml
            
      - name: Dump Kubernetes info on failure
        if: failure()
        run: |
          kubectl --kubeconfig src/cluster_api/auth/k3d-devcluster.yaml get pods -A -o wide
          kubectl --kubeconfig src/cluster_api/auth/k3d-devcluster.yaml describe pod -l name=llama-server || true
          kubectl --kubeconfig src/cluster_api/auth/k3d-devcluster.yaml logs -l name=llama-server --all-containers=true --tail=200 || true
          cat port-forward.log || true
