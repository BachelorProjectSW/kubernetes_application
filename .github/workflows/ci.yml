name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      ELECTRICITY_MAPS_API_KEY: ${{ secrets.ELECTRICITY_MAPS_API_KEY }}
    strategy:
      matrix:
        python-version: [3.12]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Ruff Linter
        run: |
          ruff check .

      - name: Install k3d and kubectl
        run: |
          python test/k3d/setup_kubernetes.py 

      - name: Create clusters and global scheduler
        run: |
          python test/k3d/create_clusters.py

      - name: Deploy manifests
        run: |
          python test/k3d/deploy.py

      - name: Run servers and port-forward
        run: |
          python test/k3d/run_servers.py &

      - name: Run tests with llama port-forward
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8888/v1/models && curl -fsS http://127.0.0.1:8889/v1/models; then
              pytest
              exit 0
            fi
            sleep 2
          done

          exit 1
