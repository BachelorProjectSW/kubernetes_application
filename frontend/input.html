<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Microgrid Experiment Framework</title>

    <style>
      body {
        font-family: Arial;
        background: #f4f6f8;
        padding: 20px;
      }
      .container {
        max-width: 1200px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 8px;
      }
      h2 {
        margin-top: 30px;
        border-bottom: 1px solid #ddd;
        padding-bottom: 5px;
      }

      .row {
        display: flex;
        gap: 20px;
        margin-bottom: 15px;
      }
      .field {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      input,
      select {
        padding: 6px;
        margin-top: 5px;
      }

      .rule {
        background: #e9ecef;
        padding: 12px;
        margin: 10px 0;
        cursor: move;
      }
      .condition {
        margin: 5px 0;
      }

      .node {
        background: #e9ecef;
        padding: 8px;
        margin: 5px 0;
        cursor: move;
        display: flex;
        justify-content: space-between;
      }

      button {
        margin-top: 10px;
        padding: 6px 12px;
        background: #2c7be5;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      button.small {
        padding: 4px 8px;
        font-size: 12px;
      }
      button.delete {
        background: #c0392b;
      }

      .small {
        font-size: 0.85em;
        color: #555;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Microgrid Experiment Framework</h1>

      <!-- ===================== -->
      <!-- EXPERIMENT HEADER -->
      <!-- ===================== -->

      <h2>Experiment</h2>

      <div class="row">
        <div class="field">
          <label>Experiment ID</label>
          <input type="text" id="experimentId" placeholder="exp_001" />
        </div>
        <div style="align-self: flex-end">
          <button onclick="saveConfig()">Save</button>
          <button onclick="loadConfig()">Load</button>
        </div>
      </div>

      <!-- ===================== -->
      <!-- WORKLOAD CONFIG -->
      <!-- ===================== -->

      <h2>Workload Configuration</h2>

      <div class="row">
        <div class="field">
          <label>Max Input Tokens</label>
          <input type="number" id="inputTokens" value="512" />
        </div>
        <div class="field">
          <label>Max Output Tokens</label>
          <input type="number" id="outputTokens" value="256" />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>Request Rate (req/min)</label>
          <input type="number" id="requestRate" value="30" />
        </div>
        <div class="field">
          <label>Duration (minutes)</label>
          <input type="number" id="duration" value="60" />
        </div>
      </div>

      <!-- ===================== -->
      <!-- SCALING RULES -->
      <!-- ===================== -->

      <h2>Scaling Rules (First Match Wins)</h2>

      <label>Scaling rules time for check(seconds)</label>
      <input type="number" placeholder="500" />

      <div id="ruleList"></div>

      <button onclick="addRule()">+ Add Rule</button>

      <!-- ===================== -->
      <!-- NODE MANAGEMENT -->
      <!-- ===================== -->

      <h2>Node Pool & Priority</h2>

      <div class="row">
        <div class="field">
          <label>Add Node Name</label>
          <input type="text" id="newNodeName" placeholder="Nano-1" />
        </div>
        <div class="field">
          <label>Initial State</label>
          <select id="newNodeState">
            <option value="on">ON</option>
            <option value="idle">IDLE</option>
            <option value="off">OFF</option>
          </select>
        </div>
      </div>

      <button onclick="addNode()">Add Node</button>

      <ul id="nodeList"></ul>

      <button onclick="simulate()">Simulate</button>

      <p id="result"></p>
    </div>

    <script>
      // =====================
      // RULE ENGINE
      // =====================

      function addRule(ruleData = null) {
        const ruleDiv = document.createElement("div");
        ruleDiv.className = "rule";
        ruleDiv.draggable = true;

        ruleDiv.innerHTML = `
        <div class="conditions"></div>
        <button class="small" onclick="addCondition(this)">+ Add Condition</button>
        THEN
        <select class="action">
            <option value="on">Set node ON</option>
            <option value="idle">Set node IDLE</option>
            <option value="off">Set node OFF</option>
        </select>
        <button class="small delete" onclick="this.parentElement.remove()">Delete Rule</button>
    `;

        document.getElementById("ruleList").appendChild(ruleDiv);

        if (ruleData) {
          ruleData.conditions.forEach((c) =>
            addCondition(ruleDiv.querySelector("button.small"), c),
          );
          ruleDiv.querySelector(".action").value = ruleData.action;
        } else {
          addCondition(ruleDiv.querySelector("button.small"));
        }
      }

      function addCondition(btn, condData = null) {
        const ruleDiv = btn.closest(".rule");
        const container = ruleDiv.querySelector(".conditions");

        const condDiv = document.createElement("div");
        condDiv.className = "condition";

        condDiv.innerHTML = `
        <select class="logic">
            <option value="">IF</option>
            <option value="AND">AND</option>
            <option value="OR">OR</option>
        </select>

        <select class="var">
            <option value="L">Latency (L)</option>
            <option value="G">Surplus Energy (G)</option>
        </select>

        <select class="op">
            <option value=">">&gt;</option>
            <option value="<">&lt;</option>
        </select>

        <input type="number" class="th" placeholder="Threshold">
        <button class="small delete" onclick="this.parentElement.remove()">x</button>
    `;

        container.appendChild(condDiv);

        if (condData) {
          condDiv.querySelector(".logic").value = condData.logic;
          condDiv.querySelector(".var").value = condData.var;
          condDiv.querySelector(".op").value = condData.op;
          condDiv.querySelector(".th").value = condData.th;
        }
      }

      // =====================
      // NODE MANAGEMENT
      // =====================

      function addNode(name = null, state = null) {
        const nodeName = name || document.getElementById("newNodeName").value;
        const nodeState =
          state || document.getElementById("newNodeState").value;

        if (!nodeName) return;

        const li = document.createElement("li");
        li.className = "node";
        li.innerHTML = `
        <span>${nodeName} (${nodeState.toUpperCase()})</span>
        <button class="small delete" onclick="this.parentElement.remove()">Delete</button>
    `;

        document.getElementById("nodeList").appendChild(li);

        document.getElementById("newNodeName").value = "";
      }

      // =====================
      // SAVE / LOAD
      // =====================

      function saveConfig() {
        const id = document.getElementById("experimentId").value;
        if (!id) return alert("Provide Experiment ID");

        const config = {
          workload: {
            inputTokens: document.getElementById("inputTokens").value,
            outputTokens: document.getElementById("outputTokens").value,
            requestRate: document.getElementById("requestRate").value,
            duration: document.getElementById("duration").value,
          },
          rules: [],
          nodes: [],
        };

        document.querySelectorAll(".rule").forEach((rule) => {
          const ruleObj = {
            action: rule.querySelector(".action").value,
            conditions: [],
          };

          rule.querySelectorAll(".condition").forEach((cond) => {
            ruleObj.conditions.push({
              logic: cond.querySelector(".logic").value,
              var: cond.querySelector(".var").value,
              op: cond.querySelector(".op").value,
              th: cond.querySelector(".th").value,
            });
          });

          config.rules.push(ruleObj);
        });

        document.querySelectorAll("#nodeList .node").forEach((node) => {
          config.nodes.push(node.querySelector("span").innerText);
        });

        localStorage.setItem(id, JSON.stringify(config));
        alert("Configuration saved.");
      }

      function loadConfig() {
        const id = document.getElementById("experimentId").value;
        if (!id) return alert("Provide Experiment ID");

        const config = JSON.parse(localStorage.getItem(id));
        if (!config) return alert("No configuration found.");

        document.getElementById("inputTokens").value =
          config.workload.inputTokens;
        document.getElementById("outputTokens").value =
          config.workload.outputTokens;
        document.getElementById("requestRate").value =
          config.workload.requestRate;
        document.getElementById("duration").value = config.workload.duration;

        document.getElementById("ruleList").innerHTML = "";
        config.rules.forEach((r) => addRule(r));

        document.getElementById("nodeList").innerHTML = "";
        config.nodes.forEach((n) => {
          const [name, state] = n.split("(");
          addNode(name.trim(), state.replace(")", "").toLowerCase());
        });

        alert("Configuration loaded.");
      }

      // =====================
      // SIMULATION
      // =====================

      function simulate() {
        const currentLatency = 120;
        const currentSurplus = 80;

        const rules = document.querySelectorAll(".rule");

        for (let rule of rules) {
          let result = null;

          rule.querySelectorAll(".condition").forEach((cond, index) => {
            const logic = cond.querySelector(".logic").value;
            const variable = cond.querySelector(".var").value;
            const operator = cond.querySelector(".op").value;
            const threshold = parseFloat(cond.querySelector(".th").value);

            const value = variable === "L" ? currentLatency : currentSurplus;
            const condition =
              operator === ">" ? value > threshold : value < threshold;

            if (index === 0) result = condition;
            else if (logic === "AND") result = result && condition;
            else if (logic === "OR") result = result || condition;
          });

          if (result) {
            document.getElementById("result").innerText =
              "Rule matched → Action executed: " +
              rule.querySelector(".action").value.toUpperCase();
            return;
          }
        }

        document.getElementById("result").innerText = "No rule matched.";
      }
    </script>
  </body>
</html>
