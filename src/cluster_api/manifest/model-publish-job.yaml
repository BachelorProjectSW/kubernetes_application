apiVersion: batch/v1
kind: Job
metadata:
  name: model-publish
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        registry: "true"
      containers:
        - name: publish
          image: alpine:3.20
          envFrom:
            - configMapRef:
                name: llama-settings
          command:
            - sh
            - -lc
            - |
              set -eu

              apk add --no-cache curl tar wget ca-certificates

              ORAS_VERSION=1.3.0
              ARCH="$(uname -m)"
              case "$ARCH" in
                x86_64) ORAS_ARCH=amd64 ;;
                aarch64) ORAS_ARCH=arm64 ;;
                armv7l) ORAS_ARCH=armv7 ;;
                *) echo "Unsupported arch: $ARCH"; exit 1 ;;
              esac

              curl -L "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_${ORAS_ARCH}.tar.gz" -o /tmp/oras.tar.gz
              tar -xzf /tmp/oras.tar.gz -C /tmp oras
              chmod +x /tmp/oras

              REGISTRY="local-registry:5000"
              REF="${REGISTRY}/${MODEL_REPO}:${MODEL_TAG}"

              if /tmp/oras manifest fetch --plain-http "$REF" >/dev/null 2>&1; then
                echo "Artifact already exists: $REF"
                exit 0
              fi

              mkdir -p /work
              cd /work

              if [ ! -f "$MODEL_FILE" ]; then
                echo "Downloading model from Hugging Face..."
                wget -O "$MODEL_FILE" "$MODEL_URL"
              fi

              echo "Pushing artifact to local registry: $REF"
              /tmp/oras push --plain-http "$REF" "$MODEL_FILE:application/octet-stream"

              echo "Publish complete"