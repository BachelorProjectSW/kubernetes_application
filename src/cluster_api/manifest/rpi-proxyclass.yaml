apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: rpi-proxy
spec:
  statefulSet:
    pod:
      nodeSelector:
        kubernetes.io/hostname: rpi-control
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"


