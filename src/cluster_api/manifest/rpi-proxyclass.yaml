apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: rpi-proxy
spec:
  statefulSet:
    pod:
     nodeSelector:
      node-role.kubernetes.io/control-plane: ""
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"

