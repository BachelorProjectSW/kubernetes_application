apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-init
data:
  init-model.sh: |
    #!/bin/sh
    set -eu

    mkdir -p /models

    REF="local-registry:5000/${MODEL_REPO}:${MODEL_TAG}"
    REF_FILE="/models/.model_ref"
    DEST="/models/${MODEL_FILE}"

    if [ -f "$DEST" ] && [ -f "$REF_FILE" ] && [ "$(cat "$REF_FILE")" = "$REF" ]; then
      echo "Model already up to date: $REF"
      ln -sf "$DEST" /models/model.gguf
      ls -lh "$DEST"
      exit 0
    fi

    apk add --no-cache curl tar ca-certificates

    ORAS_VERSION=1.3.0
    ARCH="$(uname -m)"
    case "$ARCH" in
      x86_64) ORAS_ARCH=amd64 ;;
      aarch64) ORAS_ARCH=arm64 ;;
      armv7l) ORAS_ARCH=armv7 ;;
      *) echo "Unsupported arch: $ARCH"; exit 1 ;;
    esac

    curl -L "https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_${ORAS_ARCH}.tar.gz" -o /tmp/oras.tar.gz
    tar -xzf /tmp/oras.tar.gz -C /tmp oras
    chmod +x /tmp/oras

    TMP_DIR="$(mktemp -d)"
    trap 'rm -rf "$TMP_DIR"' EXIT

    cd "$TMP_DIR"
    echo "Pulling model from registry: $REF"
    /tmp/oras pull --plain-http "$REF"

    if [ ! -f "$MODEL_FILE" ]; then
      echo "Expected $MODEL_FILE not found after oras pull"
      ls -lah
      exit 1
    fi

    cp "$MODEL_FILE" "$DEST"
    printf '%s\n' "$REF" > "$REF_FILE"
    ln -sf "$DEST" /models/model.gguf

    echo "Model ready:"
    ls -lh /models/model.gguf