apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-init
data:
  init-download.sh: |
    #!/bin/sh
    set -eu

    mkdir -p /models
    DEST="/models/${MODEL_FILE}"
    TMP="${DEST}.tmp"

    if [ -f "$DEST" ]; then
      echo "Model already cached: $DEST"
    else
      echo "Downloading model..."
      echo "URL:  $MODEL_URL"
      echo "Dest: $DEST"
      wget -O "$TMP" "$MODEL_URL"
      mv "$TMP" "$DEST"
    fi

    ln -sf "$DEST" /models/model.gguf

