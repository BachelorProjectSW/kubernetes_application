apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: devcluster

servers: 1
agents: 2

network: k3d-network

ports:
  - port: 8080:80
    nodeFilters:
      - loadbalancer

options:
  k3s:
    extraArgs:
      - arg: "--disable=traefik"
        nodeFilters:
          - server:0
      - arg: "--node-taint=node-role.kubernetes.io/control-plane=true:NoSchedule"
        nodeFilters:
          - server:0
      - arg: "--node-label=llama=true"
        nodeFilters:
          - agent:*